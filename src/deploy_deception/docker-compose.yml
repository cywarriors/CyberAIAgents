version: "3.9"
services:
  deception-agent:
    build: ..
    dockerfile: deploy_deception/Dockerfile
    image: deception-honeypot-agent:latest
    ports:
      - "8012:8012"
      - "8092:8092"
    environment:
      - DECEPTION_AGENT_ENV=production
      - DECEPTION_LOG_LEVEL=INFO
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8012/healthz')"]
      interval: 30s
      timeout: 5s
      retries: 3

  deception-gui:
    image: nginx:alpine
    ports:
      - "3012:80"
    volumes:
      - ./gui-dist:/usr/share/nginx/html:ro
    restart: unless-stopped
    depends_on:
      - deception-agent

  redis:
    image: redis:7-alpine
    command: redis-server --save "" --appendonly no
    restart: unless-stopped
