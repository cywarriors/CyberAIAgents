apiVersion: apps/v1
kind: Deployment
metadata:
  name: deception-honeypot-agent
  labels:
    app: deception-honeypot-agent
spec:
  replicas: 2
  selector:
    matchLabels:
      app: deception-honeypot-agent
  template:
    metadata:
      labels:
        app: deception-honeypot-agent
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: deception-honeypot-agent
          image: deception-honeypot-agent:latest
          ports:
            - containerPort: 8012
            - containerPort: 8092
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8012
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8012
            initialDelaySeconds: 5
            periodSeconds: 10
          envFrom:
            - configMapRef:
                name: deception-config
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2000m"
              memory: "2Gi"
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
