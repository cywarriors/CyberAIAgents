apiVersion: apps/v1
kind: Deployment
metadata:
  name: compliance-audit-agent
  labels: {app: compliance-audit-agent}
spec:
  replicas: 2
  selector:
    matchLabels: {app: compliance-audit-agent}
  template:
    metadata:
      labels: {app: compliance-audit-agent}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9100"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: compliance-audit-agent
          image: compliance-audit-agent:latest
          ports:
            - {containerPort: 8010}
            - {containerPort: 8090}
            - {containerPort: 9100}
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities: {drop: [ALL]}
          envFrom:
            - configMapRef: {name: compliance-audit-config}
          livenessProbe:
            httpGet: {path: /healthz, port: 8010}
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet: {path: /healthz, port: 8010}
            initialDelaySeconds: 15
            periodSeconds: 10
          volumeMounts:
            - {name: tmp, mountPath: /tmp}
      volumes:
        - name: tmp
          emptyDir: {}
