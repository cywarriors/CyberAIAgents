apiVersion: v1
kind: ConfigMap
metadata:
  name: compliance-audit-config
data:
  COMPLIANCE_KAFKA_BOOTSTRAP: "kafka:9092"
  COMPLIANCE_KAFKA_TOPIC: "compliance-evidence"
  COMPLIANCE_REDIS_URL: "redis://redis:6379/1"
  COMPLIANCE_API_PORT: "8010"
  COMPLIANCE_HEALTH_PORT: "8090"
  COMPLIANCE_METRICS_PORT: "9100"
  COMPLIANCE_ENABLED_FRAMEWORKS: "ISO27001,NIST_CSF,SOC2,PCI_DSS,HIPAA"
  COMPLIANCE_EFFECTIVENESS_THRESHOLD_FULL: "85.0"
  COMPLIANCE_EFFECTIVENESS_THRESHOLD_PARTIAL: "60.0"
  COMPLIANCE_COMPLIANCE_DRIFT_ALERT_THRESHOLD: "5.0"
  COMPLIANCE_AGENT_ENV: "production"
  COMPLIANCE_LOG_LEVEL: "INFO"
