apiVersion: v1
kind: Service
metadata:
  name: code-review-agent
spec:
  selector:
    app: code-review-agent
  type: ClusterIP
  ports:
    - name: api
      port: 8011
      targetPort: 8011
    - name: health
      port: 8091
      targetPort: 8091
    - name: metrics
      port: 9101
      targetPort: 9101
