services:
  vulnerability-mgmt-api:
    container_name: vulnerability-mgmt-api
    image: vulnerability-mgmt-agent:latest
    build:
      context: ..
      dockerfile: deploy_vm/Dockerfile
    ports:
      - "8003:8003"
    environment:
      VM_AGENT_API_HOST: "0.0.0.0"
      VM_AGENT_API_PORT: "8003"
      VM_AGENT_API_DEBUG: "false"
      LOG_LEVEL: "info"
      ENABLE_METRICS: "true"
      METRICS_PORT: "8004"
      ALLOWED_ORIGINS: "http://localhost:3003"
      ALLOWED_HOSTS: "localhost,127.0.0.1,vulnerability-mgmt-api"
    networks:
      - vmagent-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8003/api/v1/admin/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true

  vulnerability-mgmt-gui:
    container_name: vulnerability-mgmt-gui
    image: node:18-alpine
    working_dir: /app
    volumes:
      - ../vulnerability_mgmt_agent/gui:/app
    ports:
      - "3003:3003"
    environment:
      VITE_API_URL: http://localhost:8003
    command: sh -c "npm install && npm run dev"
    networks:
      - vmagent-network
    depends_on:
      - vulnerability-mgmt-api
    restart: unless-stopped

  # Optional: Database for production use (PostgreSQL)
  postgres:
    container_name: vmagent-postgres
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: vulnerability_mgmt
      POSTGRES_USER: vmadmin
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    secrets:
      - db_password
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - vmagent-network
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    profiles:
      - with-db

secrets:
  db_password:
    file: ./secrets/db_password.txt

networks:
  vmagent-network:
    driver: bridge

volumes:
  postgres_data:
