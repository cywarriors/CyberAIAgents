apiVersion: v1
kind: ConfigMap
metadata:
  name: vulnerability-mgmt-config
  namespace: vulnerability-mgmt
data:
  risk-formula.yaml: |
    cvss_weight: 0.35
    epss_weight: 0.25
    kev_weight: 0.15
    criticality_weight: 0.15
    exposure_weight: 0.10

  sla-policies.yaml: |
    critical:
      days: 7
      escalation_hours: 24
    high:
      days: 15
      escalation_hours: 48
    medium:
      days: 30
      escalation_hours: 72
    low:
      days: 60
      escalation_hours: 120

  risk-thresholds.yaml: |
    critical: 75.0
    high: 55.0
    medium: 35.0

  integrations.yaml: |
    scanner_timeout_seconds: 300
    nvd_api_timeout_seconds: 60
    cmdb_api_timeout_seconds: 30
    ticketing_api_timeout_seconds: 60
    max_concurrent_requests: 10
    rate_limit_per_minute: 100
