apiVersion: v1
kind: Service
metadata:
  name: vulnerability-mgmt-api
  namespace: vulnerability-mgmt
  labels:
    app: vulnerability-mgmt-api
    version: v1
spec:
  type: ClusterIP
  selector:
    app: vulnerability-mgmt-api
  ports:
  - name: api
    port: 80
    targetPort: 8003
    protocol: TCP
  - name: metrics
    port: 8004
    targetPort: 8004
    protocol: TCP
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 3600

---
apiVersion: v1
kind: Service
metadata:
  name: vulnerability-mgmt-api-nodeport
  namespace: vulnerability-mgmt
spec:
  type: NodePort
  selector:
    app: vulnerability-mgmt-api
  ports:
  - name: api
    port: 8003
    targetPort: 8003
    nodePort: 30003
    protocol: TCP
