apiVersion: v1
kind: ConfigMap
metadata:
  name: threat-detection-agent-config
data:
  AGENT_ENV: "production"
  LOG_LEVEL: "INFO"
  KAFKA_BOOTSTRAP_SERVERS: "kafka.svc.cluster.local:9092"
  KAFKA_CONSUMER_GROUP: "threat-detection-agent"
  KAFKA_TELEMETRY_TOPIC: "security.telemetry"
  KAFKA_ALERT_TOPIC: "security.alerts"
  REDIS_URL: "redis://redis.svc.cluster.local:6379/0"
  DEDUP_WINDOW_SECONDS: "300"
  SEVERITY_THRESHOLD_FOR_PAGING: "Critical"
  CONFIDENCE_THRESHOLD: "50"
  PROMETHEUS_PORT: "9090"
  HEALTH_CHECK_PORT: "8080"
