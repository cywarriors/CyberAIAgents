apiVersion: apps/v1
kind: Deployment
metadata:
  name: threat-detection-agent
  labels:
    app: threat-detection-agent
    srs: SRS-CYBER-01
spec:
  replicas: 3
  selector:
    matchLabels:
      app: threat-detection-agent
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: threat-detection-agent
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: threat-detection-agent
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: agent
          image: threat-detection-agent:latest
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: threat-detection-agent-config
            - secretRef:
                name: threat-detection-agent-secrets
          resources:
            requests:
              cpu: "2"
              memory: 8Gi
            limits:
              cpu: "8"
              memory: 32Gi
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: threat-detection-agent
