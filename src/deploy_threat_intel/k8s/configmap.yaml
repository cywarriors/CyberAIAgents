apiVersion: v1
kind: ConfigMap
metadata:
  name: threat-intelligence-config
  namespace: cyber-agents
  labels:
    app: threat-intelligence-agent
data:
  THREAT_INTEL_ENV: "production"
  THREAT_INTEL_LOG_LEVEL: "INFO"
  THREAT_INTEL_KAFKA_BOOTSTRAP: "kafka-0.kafka:9092,kafka-1.kafka:9092,kafka-2.kafka:9092"
  THREAT_INTEL_KAFKA_TOPIC: "threat-intelligence"
  THREAT_INTEL_KAFKA_GROUP: "threat-intel-agent"
  THREAT_INTEL_REDIS_URL: "redis://redis-master:6379/4"
  THREAT_INTEL_API_PORT: "8009"
  THREAT_INTEL_HEALTH_PORT: "8089"
  THREAT_INTEL_METRICS_PORT: "9099"
  THREAT_INTEL_CONFIDENCE_THRESHOLD: "70"
  THREAT_INTEL_DISTRIBUTION_CONFIDENCE_MIN: "80"
  THREAT_INTEL_RELEVANCE_INDUSTRY_WEIGHT: "0.30"
  THREAT_INTEL_RELEVANCE_GEOGRAPHY_WEIGHT: "0.25"
  THREAT_INTEL_RELEVANCE_ATTACK_SURFACE_WEIGHT: "0.25"
  THREAT_INTEL_RELEVANCE_HISTORICAL_WEIGHT: "0.20"
  THREAT_INTEL_IOC_AGE_DEPRECATION_DAYS: "180"
  THREAT_INTEL_SOURCE_STALE_THRESHOLD_MINUTES: "15"
  THREAT_INTEL_DEDUP_SIMILARITY_THRESHOLD: "0.99"
  THREAT_INTEL_OSINT_FEEDS_ENABLED: "true"
  THREAT_INTEL_COMMERCIAL_FEEDS_ENABLED: "true"
  THREAT_INTEL_ISAC_FEEDS_ENABLED: "true"
  THREAT_INTEL_INTERNAL_FEEDS_ENABLED: "true"
  THREAT_INTEL_ALLOW_ORIGINS: "https://threat-intel.example.com"
