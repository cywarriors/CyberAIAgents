version: "3.9"

services:
  # -----------------------------------------------------------------------
  # Infrastructure dependencies
  # -----------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  kafka:
    image: bitnami/kafka:3.7
    ports:
      - "9092:9092"
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: agent
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
      POSTGRES_DB: identity_access
    secrets:
      - db_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent"]
      interval: 10s
      timeout: 3s
      retries: 5

  # -----------------------------------------------------------------------
  # Identity & Access Monitoring Agent
  # -----------------------------------------------------------------------
  identity-access-agent:
    build:
      context: ..
      dockerfile: deploy_identity/Dockerfile
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    ports:
      - "8006:8006"
      - "8086:8086"
      - "9096:9096"
    environment:
      IDENTITY_AGENT_ENV: development
      IDENTITY_LOG_LEVEL: INFO
      IDENTITY_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      IDENTITY_REDIS_URL: redis://redis:6379/6
      IDENTITY_POSTGRES_DSN: postgresql+asyncpg://agent:agent@postgres:5432/identity_access
    read_only: true
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

secrets:
  db_password:
    file: ./secrets/db_password.txt
