apiVersion: v1
kind: ConfigMap
metadata:
  name: identity-access-agent-config
data:
  IDENTITY_AGENT_ENV: "production"
  IDENTITY_LOG_LEVEL: "INFO"
  IDENTITY_API_HOST: "0.0.0.0"
  IDENTITY_API_PORT: "8006"
  IDENTITY_KAFKA_BOOTSTRAP_SERVERS: "kafka.svc.cluster.local:9092"
  IDENTITY_KAFKA_GROUP_ID: "identity-access-agent"
  IDENTITY_KAFKA_TOPIC_AUTH_EVENTS: "identity.auth_events"
  IDENTITY_KAFKA_TOPIC_ROLE_CHANGES: "identity.role_changes"
  IDENTITY_KAFKA_TOPIC_RISK_ALERTS: "identity.risk_alerts"
  IDENTITY_REDIS_URL: "redis://redis.svc.cluster.local:6379/6"
  IDENTITY_PROMETHEUS_PORT: "9096"
  IDENTITY_HEALTH_CHECK_PORT: "8086"
  IDENTITY_RISK_THRESHOLD_CRITICAL: "85"
  IDENTITY_RISK_THRESHOLD_HIGH: "65"
  IDENTITY_RISK_THRESHOLD_MEDIUM: "40"
