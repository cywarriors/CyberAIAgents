apiVersion: v1
kind: Namespace
metadata:
  name: cloud-security

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloud-security-api
  namespace: cloud-security
  labels:
    app: cloud-security-api
    version: v1
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: cloud-security-api
  template:
    metadata:
      labels:
        app: cloud-security-api
        version: v1
    spec:
      serviceAccountName: cloud-security-api
      containers:
      - name: cloud-security-api
        image: cloud-security-agent:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: api
          containerPort: 8006
          protocol: TCP
        - name: metrics
          containerPort: 8007
          protocol: TCP
        env:
        - name: CSPM_API_HOST
          value: "0.0.0.0"
        - name: CSPM_API_PORT
          value: "8006"
        - name: LOG_LEVEL
          value: "info"
        - name: ENABLE_METRICS
          value: "true"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: cloud-security-secrets
              key: database-url
        resources:
          requests:
            cpu: 500m
            memory: 512Mi
          limits:
            cpu: 2000m
            memory: 2Gi
        livenessProbe:
          httpGet:
            path: /api/v1/admin/health
            port: api
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/v1/admin/health
            port: api
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 5
          failureThreshold: 2
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          seccompProfile:
            type: RuntimeDefault
          capabilities:
            drop:
            - ALL
        volumeMounts:
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: tmp
        emptyDir:
          sizeLimit: 100Mi

---
apiVersion: v1
kind: Service
metadata:
  name: cloud-security-api
  namespace: cloud-security
  labels:
    app: cloud-security-api
spec:
  type: ClusterIP
  ports:
  - name: api
    port: 80
    targetPort: 8006
    protocol: TCP
  - name: metrics
    port: 8007
    targetPort: 8007
    protocol: TCP
  selector:
    app: cloud-security-api

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: cloud-security-api-hpa
  namespace: cloud-security
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: cloud-security-api
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cloud-security-api
  namespace: cloud-security

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: cloud-security-api
  namespace: cloud-security
rules:
- apiGroups: [""]
  resources: ["configmaps"]
  resourceNames: ["cloud-security-config"]
  verbs: ["get", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cloud-security-api
  namespace: cloud-security
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: cloud-security-api
subjects:
- kind: ServiceAccount
  name: cloud-security-api
  namespace: cloud-security
