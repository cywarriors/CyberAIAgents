apiVersion: v1
kind: Service
metadata:
  name: cloud-security-api
  namespace: cloud-security
  labels:
    app: cloud-security-api
    version: v1
spec:
  type: ClusterIP
  selector:
    app: cloud-security-api
  ports:
  - name: api
    port: 80
    targetPort: 8006
    protocol: TCP
  - name: metrics
    port: 8007
    targetPort: 8007
    protocol: TCP
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 3600

---
apiVersion: v1
kind: Service
metadata:
  name: cloud-security-api-nodeport
  namespace: cloud-security
spec:
  type: NodePort
  selector:
    app: cloud-security-api
  ports:
  - name: api
    port: 8006
    targetPort: 8006
    nodePort: 30006
    protocol: TCP
