apiVersion: v1
kind: ConfigMap
metadata:
  name: phishing-defense-agent-config
data:
  PHISHING_AGENT_ENV: "production"
  PHISHING_LOG_LEVEL: "INFO"
  PHISHING_API_HOST: "0.0.0.0"
  PHISHING_API_PORT: "8005"
  PHISHING_KAFKA_BOOTSTRAP_SERVERS: "kafka.svc.cluster.local:9092"
  PHISHING_KAFKA_CONSUMER_GROUP: "phishing-defense-agent"
  PHISHING_KAFKA_EMAIL_INGEST_TOPIC: "email.inbound"
  PHISHING_KAFKA_VERDICT_TOPIC: "email.verdicts"
  PHISHING_KAFKA_IOC_TOPIC: "threat.iocs"
  PHISHING_REDIS_URL: "redis://redis.svc.cluster.local:6379/5"
  PHISHING_PROMETHEUS_PORT: "9095"
  PHISHING_HEALTH_CHECK_PORT: "8085"
  PHISHING_VERDICT_BLOCK_THRESHOLD: "80"
  PHISHING_VERDICT_QUARANTINE_THRESHOLD: "60"
  PHISHING_VERDICT_WARN_THRESHOLD: "40"
