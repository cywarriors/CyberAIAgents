version: "3.9"

services:
  # -----------------------------------------------------------------------
  # Infrastructure dependencies
  # -----------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  kafka:
    image: bitnami/kafka:3.7
    ports:
      - "9092:9092"
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: agent
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
      POSTGRES_DB: phishing_defense
    secrets:
      - db_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent"]
      interval: 10s
      timeout: 3s
      retries: 5

  # -----------------------------------------------------------------------
  # Phishing Defense Agent
  # -----------------------------------------------------------------------
  phishing-defense-agent:
    build:
      context: ..
      dockerfile: deploy_phishing/Dockerfile
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    ports:
      - "8005:8005"
      - "8085:8085"
      - "9095:9095"
    environment:
      PHISHING_AGENT_ENV: development
      PHISHING_LOG_LEVEL: INFO
      PHISHING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      PHISHING_REDIS_URL: redis://redis:6379/5
      PHISHING_POSTGRES_DSN: postgresql+asyncpg://agent:agent@postgres:5432/phishing_defense
    read_only: true
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

secrets:
  db_password:
    file: ./secrets/db_password.txt
