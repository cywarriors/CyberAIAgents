apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: vapt-agent-hpa
  labels:
    app: vapt-agent
    srs: SRS-CYBER-13
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: vapt-agent
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
