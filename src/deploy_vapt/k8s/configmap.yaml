apiVersion: v1
kind: ConfigMap
metadata:
  name: vapt-agent-config
  labels:
    app: vapt-agent
    srs: SRS-CYBER-13
data:
  AGENT_ENV: production
  LOG_LEVEL: INFO
  KAFKA_BOOTSTRAP_SERVERS: kafka.default.svc.cluster.local:9092
  KAFKA_CONSUMER_GROUP: vapt-agent-group
  KAFKA_SCAN_REQUESTS_TOPIC: vapt.scan-requests
  KAFKA_FINDINGS_TOPIC: vapt.findings
  REDIS_URL: redis://redis.default.svc.cluster.local:6379/2
  POSTGRES_DSN: postgresql://vapt:vapt@postgres.default.svc.cluster.local:5432/vapt
  HEALTH_CHECK_PORT: "8083"
  PROMETHEUS_PORT: "9091"
  REPORT_OUTPUT_DIR: /data/reports
  MAX_CONCURRENT_SCANS: "50"
  EXPLOITATION_TIMEOUT_SECONDS: "60"
  SCAN_TIMEOUT_MINUTES: "120"
  DEDUP_WINDOW_SECONDS: "600"
  NVD_API_URL: https://services.nvd.nist.gov/rest/json
  EPSS_API_URL: https://api.first.org/data/v1/epss
  KEV_CATALOG_URL: https://www.cisa.gov/sites/default/files/feeds/known_exploited_vulnerabilities.json
